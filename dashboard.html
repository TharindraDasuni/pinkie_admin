<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Dashboard</title>

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light" style="background-color: #f8f9fa !important;">

    <div class="d-flex" id="wrapper">

        <div class="sidebar-wrapper shadow-sm" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold">
                <img src="assets/images/logo_cover.png" alt="Pinkie Logo" style="width: 130px; filter: brightness(0) invert(1);">
            </div>
            <div class="list-group list-group-flush mt-2 px-3">
                <a href="dashboard.html" class="list-group-item list-group-item-action active-nav rounded mb-2 py-3">
                    <i class="fas fa-home me-3"></i> Dashboard
                </a>
                <a href="#" class="list-group-item list-group-item-action sidebar-link rounded mb-2 py-3">
                    <i class="fas fa-gem me-3"></i> Products
                </a>
                <a href="#" class="list-group-item list-group-item-action sidebar-link rounded mb-2 py-3">
                    <i class="fas fa-box me-3"></i> Inventory
                </a>
                <a href="#" class="list-group-item list-group-item-action sidebar-link rounded mb-2 py-3">
                    <i class="fas fa-shopping-bag me-3"></i> Orders
                </a>
                <a href="#" class="list-group-item list-group-item-action sidebar-link rounded mb-2 py-3">
                    <i class="fas fa-chart-line me-3"></i> Sales
                </a>
                <a href="#" class="list-group-item list-group-item-action sidebar-link rounded mb-2 py-3">
                    <i class="fas fa-users me-3"></i> Customers
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            
            <nav class="navbar navbar-expand-lg bg-white py-3 px-4 mb-4 shadow-sm">
                <div class="d-flex align-items-center w-100">
                    <i class="fas fa-bars fs-4 me-3 text-muted" id="menu-toggle" style="cursor: pointer; transition: 0.3s;"></i>
                    <h4 class="m-0 fw-bold text-dark">Overview</h4>
                    
                    <div class="input-group ms-5 d-none d-md-flex" style="max-width: 400px;">
                        <input type="text" class="form-control border-end-0 bg-light" placeholder="Search..." style="border-radius: 10px 0 0 10px;">
                        <span class="input-group-text bg-light border-start-0" style="border-radius: 0 10px 10px 0;">
                            <i class="fas fa-search text-muted"></i>
                        </span>
                    </div>

                    <div class="ms-auto d-flex align-items-center">
                        <div class="position-relative me-4">
                            <i class="fas fa-bell fs-5 text-muted"></i>
                            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger rounded-circle"></span>
                        </div>
                        <span class="me-3 fw-bold text-dark d-none d-md-block">Pinkie Admin</span>
                        <img src="https://ui-avatars.com/api/?name=Pinkie+Admin&background=da5586&color=fff" class="rounded-circle" width="45">
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4 flex-grow-1">
                
                <div class="row g-4 mb-4">
                    <div class="col-xl-3 col-md-6">
                        <div class="card dash-card border-0 rounded-4 p-3">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-muted mb-1 fs-6">Total Revenue</p>
                                    <p class="text-muted" style="font-size: 11px;">Last 30 days</p>
                                </div>
                                <div class="bg-pink-light rounded-circle d-flex align-items-center justify-content-center" style="width:45px; height:45px;">
                                    <i class="fas fa-coins" style="color:#ef80ac;"></i>
                                </div>
                            </div>
                            <h3 class="fw-bold text-dark mt-2 mb-2">Rs. 82,650</h3>
                            <p class="mb-0" style="font-size: 13px;"><span class="text-success"><i class="fas fa-arrow-up"></i> 11%</span> <span class="text-muted">vs last month</span></p>
                        </div>
                    </div>
                    </div>

            </div>

            <footer class="mt-auto py-3 bg-white border-top text-center text-muted" style="font-size: 13px;">
                <strong>Pinkie</strong> Dashboard &copy; 2024. Developed by <span style="color: #da5586; font-weight: bold;">Sylvestra Software Solution</span>.
            </footer>

        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById("menu-toggle").addEventListener("click", function(e) {
            e.preventDefault();
            document.getElementById("wrapper").classList.toggle("toggled");
        });
    </script>

</body>
</html>
