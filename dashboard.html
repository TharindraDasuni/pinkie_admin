<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Dashboard</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="d-flex" id="wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 flex-grow-1">

                <!-- Stats Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-xl-3 col-md-6">
                        <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-muted mb-1 fs-6">Total Revenue</p>
                                    <p class="text-muted" style="font-size: 11px;">Last 30 days</p>
                                </div>
                                <div class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                                    style="width:45px; height:45px;">
                                    <i class="fas fa-coins text-pinkie"></i>
                                </div>
                            </div>
                            <h3 class="fw-bold mt-2 mb-2" style="color: var(--text-dark);">Rs. 82,650</h3>
                            <p class="mb-0" style="font-size: 13px;"><span class="text-success fw-bold"><i
                                        class="fas fa-arrow-up"></i> 11%</span> <span class="text-muted">vs last
                                    month</span></p>
                        </div>
                    </div>
                    <!-- Repeat for other cards... -->
                </div>

                <!-- Sales Chart -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card glass-panel rounded-4 p-4 dash-card border-0">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold m-0" style="color: var(--text-dark);">Sales Analytics</h5>
                                <select class="form-select form-select-sm w-auto glass-input fw-bold" style="color: var(--text-dark);">
                                    <option>July 2026</option>
                                    <option>August 2026</option>
                                </select>
                            </div>
                            <div style="height: 300px;">
                                <canvas id="salesChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Top Selling Products -->
                <div class="row mb-5">
                    <div class="col-12">
                        <div class="card glass-panel rounded-4 p-4 dash-card border-0">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="fw-bold m-0" style="color: var(--text-dark);">Top Selling Jewelry</h5>
                                <a href="#" class="text-decoration-none" style="color: var(--primary-main); font-weight: 600;">View
                                    All <i class="fas fa-arrow-right"></i></a>
                            </div>
                            <!-- Product list (update with modern touch) -->
                            <div class="row g-4 text-center">
                                <!-- Sample product item -->
                                <div class="col-md-2 col-6">
                                    <div class="product-img-box glass-input rounded-4 mb-3 p-3 border-0">
                                        <img src="https://cdn-icons-png.flaticon.com/512/879/879793.png"
                                            class="img-fluid" style="height: 70px; opacity: 0.8;">
                                    </div>
                                    <h6 class="fw-bold mb-1" style="color: var(--text-dark); font-size: 14px;">Rose Gold Ring</h6>
                                    <p class="text-muted m-0" style="font-size: 12px;">752 Pcs</p>
                                </div>
                                <!-- Add more items... -->
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div id="footer-container"></div>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/dashboard.js"></script>
</body>

</html>
