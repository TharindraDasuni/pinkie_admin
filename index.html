<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Sign In</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/all.min.css">
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="body-pink d-flex align-items-center justify-content-center" style="height: 100vh; overflow-y: hidden;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="row g-0">

                        <div class="col-lg-6 d-none d-lg-block">
                            <img src="assets/images/signin-image.png" alt="Pinkie Admin" class="img-fluid h-100"
                                style="object-fit: cover;">
                        </div>

                        <div class="col-lg-6 p-5 d-flex flex-column justify-content-center bg-white">

                            <div class="text-center mb-4">
                                <img src="assets/images/logo_cover.png" alt="Pinkie Logo" class="animate-logo-breathe"
                                    style="width: 180px;">
                                <h4 class="mt-3 fw-bold" style="color: #ef80ac;">Admin Workspace</h4>
                                <p class="text-muted" style="font-size: 14px;">Log In to your administrative account</p>
                            </div>

                            <form id="adminLoginForm">
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-muted" style="font-size: 13px;">Email Address
                                        *</label>
                                    <input type="email" id="email"
                                        class="form-control form-control-lg pinkie-input animate-form-item"
                                        placeholder="Enter your email" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold text-muted" style="font-size: 13px;">Password
                                        *</label>
                                    <input type="password" id="password"
                                        class="form-control form-control-lg pinkie-input animate-form-item"
                                        placeholder="Enter your password" required>
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input pinkie-checkbox" type="checkbox"
                                            id="remember_me">
                                        <label class="form-check-label text-muted" for="remember_me"
                                            style="font-size: 13px;">Remember me</label>
                                    </div>
                                    <a href="#" class="text-decoration-none" style="font-size: 13px; color: #da5586;"
                                        data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot
                                        password?</a>
                                </div>

                                <button type="button" class="btn btn-pinkie w-100 rounded-pill fw-bold"
                                    onclick="signIn()">Sign In</button>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg">
            <div class="modal-header border-bottom-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="resetModalUI()"></button>
            </div>
            <div class="modal-body text-center px-5 pb-4 pt-0">
                
                <div class="mb-4">
                    <div class="bg-light rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3"
                        style="width: 70px; height: 70px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" fill="#da5586" viewBox="0 0 640 640">
                            <path d="M256 72C322.3 72 376 125.7 376 192C376 258.3 322.3 312 256 312C189.7 312 136 258.3 136 192C136 125.7 189.7 72 256 72zM226.3 368L285.7 368C315.4 368 343.4 375.3 368 388.1L368 392.4C348.4 410 336 435.5 336 463.9L336 559.9C336 565.4 336.5 570.8 337.3 576L77.7 576C61.3 576 48 562.7 48 546.3C48 447.8 127.8 368 226.3 368zM528 368.1C528 350.4 513.7 336.1 496 336.1C478.3 336.1 464 350.4 464 368.1L464 416L528 416L528 368.1zM384 464C384 443.1 397.4 425.3 416 418.7L416 368.1C416 323.9 451.8 288.1 496 288.1C540.2 288.1 576 323.9 576 368.1L576 418.7C594.6 425.3 608 443.1 608 464L608 560C608 586.5 586.5 608 560 608L432 608C405.5 608 384 586.5 384 560L384 464z" />
                        </svg>
                    </div>
                    <h4 class="fw-bold text-dark" id="modalTitle">Forgot Password?</h4>
                    <p class="text-muted" style="font-size: 14px;" id="modalDesc">
                        Enter the email address associated with your admin account. We'll send an OTP to reset your password.
                    </p>
                </div>

                <form id="forgotPasswordForm">
                    <div id="emailSection">
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold text-muted" style="font-size: 13px;">Registered Email Address</label>
                            <input type="email" id="resetEmail" class="form-control form-control-lg pinkie-input" placeholder="e.g. admin@pinkie.lk" required>
                        </div>
                        <button type="button" class="btn btn-pinkie w-100 rounded-pill fw-bold py-2" onclick="sendOTP()">Send OTP</button>
                    </div>

                    <div id="resetSection" class="d-none">
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold text-muted" style="font-size: 13px;">Enter 6-Digit OTP</label>
                            <input type="text" id="otpCode" class="form-control form-control-lg pinkie-input text-center fw-bold" placeholder="• • • • • •" maxlength="6" required>
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold text-muted" style="font-size: 13px;">New Password</label>
                            <input type="password" id="newPassword" class="form-control form-control-lg pinkie-input" placeholder="Enter new password" required>
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold text-muted" style="font-size: 13px;">Confirm New Password</label>
                            <input type="password" id="confirmNewPassword" class="form-control form-control-lg pinkie-input" placeholder="Confirm new password" required>
                        </div>
                        <button type="button" class="btn btn-success w-100 rounded-pill fw-bold py-2 mb-2" onclick="updatePassword()">Reset Password</button>
                        <button type="button" class="btn btn-light w-100 rounded-pill fw-bold py-2 text-muted" onclick="resetModalUI()">Back to Email</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/signin.js"></script>

</body>

</html>
