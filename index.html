<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinkie Admin | Categories</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="d-flex" id="wrapper">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <div id="sidebar-container"></div>

      <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
        <div id="navbar-container"></div>

        <div class="container-fluid px-4 flex-grow-1">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold text-dark m-0">Manage Categories</h5>
          </div>

          <div class="row g-4 mb-5">
            <div class="col-lg-4">
              <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                <h6 class="fw-bold text-dark mb-4">
                  <i class="fas fa-plus-circle text-pinkie me-2"></i>Add New Category
                </h6>

                <form id="addCategoryForm">
                  <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Category Name *</label>
                    <input type="text" id="catName" class="form-control glass-input rounded-pill px-3 py-2" placeholder="e.g. Rings" required />
                  </div>

                  <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Description</label>
                    <textarea id="catDesc" class="form-control glass-input rounded-4 px-3 py-2" rows="4" placeholder="Brief description about the category..."></textarea>
                  </div>

                  <div class="mb-4">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Category Visuals *</label>

                    <div class="d-flex justify-content-center gap-3 mt-2">
                      <div id="imagePreviewBox" class="glass-upload-box cat-upload-square d-flex flex-column align-items-center justify-content-center text-center shadow-sm" onclick="document.getElementById('catImage').click()">
                        <div id="uploadPlaceholder">
                          <i class="fas fa-image fs-4 text-pinkie mb-1"></i>
                          <p class="text-muted m-0" style="font-size: 10px; font-weight: 500">Main Image<br />(JPG/PNG)</p>
                        </div>
                        <img id="imagePreview" src="" class="preview-cover d-none" />
                        <button type="button" id="removeImageBtn" class="btn btn-danger rounded-circle d-none shadow btn-remove-image" onclick="removeImage(event, 'image')">
                          <i class="fas fa-times" style="font-size: 12px"></i>
                        </button>
                        <input type="file" class="d-none" id="catImage" accept="image/*" onchange="previewImage(event, 'image')" />
                      </div>

                      <div id="iconPreviewBox" class="glass-upload-box cat-upload-square d-flex flex-column align-items-center justify-content-center text-center shadow-sm" onclick="document.getElementById('catIcon').click()">
                        <div id="iconUploadPlaceholder">
                          <i class="fas fa-icons fs-4 text-pinkie mb-1"></i>
                          <p class="text-muted m-0" style="font-size: 10px; font-weight: 500">Vector Icon<br />(PNG/SVG)</p>
                        </div>
                        <img id="iconPreview" src="" class="preview-contain d-none" />
                        <button type="button" id="removeIconBtn" class="btn btn-danger rounded-circle d-none shadow btn-remove-image" onclick="removeImage(event, 'icon')">
                          <i class="fas fa-times" style="font-size: 12px"></i>
                        </button>
                        <input type="file" class="d-none" id="catIcon" accept="image/png, image/svg+xml" onchange="previewImage(event, 'icon')" />
                      </div>
                    </div>
                  </div>

                  <button type="button" class="btn btn-pinkie rounded-pill w-100 fw-bold" onclick="saveCategory()">Save Category</button>
                </form>
              </div>
            </div>

            <div class="col-lg-8">
              <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                <div class="d-flex justify-content-between align-items-center mb-4">
                  <h6 class="fw-bold text-dark m-0"><i class="fas fa-list text-pinkie me-2"></i>Existing Categories</h6>
                  <div class="input-group w-50">
                    <span class="input-group-text glass-input border-end-0 bg-transparent rounded-start-pill px-3">
                      <i class="fas fa-search text-muted"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control glass-input border-start-0 rounded-end-pill" placeholder="Search by ID or Name..." onkeyup="searchCategory()" />
                  </div>
                </div>

                <div class="table-responsive">
                  <table class="table table-hover glass-table align-middle mb-0" style="border-collapse: separate; border-spacing: 0 8px">
                    <thead class="pink-header">
                      <tr>
                        <th scope="col" class="ps-3">#ID</th>
                        <th scope="col">IMAGE</th>
                        <th scope="col">ICON</th>
                        <th scope="col">CATEGORY NAME</th>
                        <th scope="col" class="text-center">PRODUCTS</th>
                        <th scope="col" class="text-center">STATUS</th>
                        <th scope="col" class="text-center pe-3">ACTIONS</th>
                      </tr>
                    </thead>
                    <tbody id="categoryTableBody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="footer-container"></div>
      </div>
    </div>

    <div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow-lg p-3">
          <div class="modal-header border-bottom-0">
            <h5 class="fw-bold text-dark m-0"><i class="fas fa-edit text-pinkie me-2"></i>Edit Category</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editCategoryForm">
              <input type="hidden" id="editCatId" />
              <div class="mb-3">
                <label class="form-label text-muted fw-bold" style="font-size: 13px">Category Name *</label>
                <input type="text" id="editCatName" class="form-control glass-input rounded-pill px-3 py-2" required />
              </div>

              <div class="mb-3">
                <label class="form-label text-muted fw-bold" style="font-size: 13px">Description</label>
                <textarea id="editCatDesc" class="form-control glass-input rounded-4 px-3 py-2" rows="3"></textarea>
              </div>

              <div class="row mb-4">
                <div class="col-4">
                  <label class="form-label text-muted fw-bold" style="font-size: 13px">Status</label>
                  <select id="editCatStatus" class="form-select glass-input rounded-pill px-3 py-2">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                  </select>
                </div>
                <div class="col-4 d-flex flex-column align-items-center">
                  <label class="form-label text-muted fw-bold" style="font-size: 13px">Change Image</label>
                  <div class="glass-upload-box cat-edit-circle shadow-sm" onclick="document.getElementById('editCatImage').click()">
                    <img id="editImagePreview" src="" class="preview-cover rounded-circle" />
                    <div class="hover-camera-overlay">
                      <i class="fas fa-camera"></i>
                    </div>
                    <input type="file" class="d-none" id="editCatImage" accept="image/*" onchange="previewEditImage(event, 'image')" />
                  </div>
                </div>
                <div class="col-4 d-flex flex-column align-items-center">
                  <label class="form-label text-muted fw-bold" style="font-size: 13px">Change Icon</label>
                  <div class="glass-upload-box cat-edit-circle shadow-sm" onclick="document.getElementById('editCatIcon').click()">
                    <img id="editIconPreview" src="" class="preview-contain rounded-circle" />
                    <div class="hover-camera-overlay">
                      <i class="fas fa-camera"></i>
                    </div>
                    <input type="file" class="d-none" id="editCatIcon" accept="image/png, image/svg+xml" onchange="previewEditImage(event, 'icon')" />
                  </div>
                </div>
              </div>

              <button type="button" class="btn btn-pinkie rounded-pill w-100 fw-bold py-2" onclick="submitEditCategory()">Update Category</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/categories.js"></script>
  </body>
</html>
