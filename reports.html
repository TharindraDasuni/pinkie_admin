<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Reports</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 flex-grow-1">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold text-dark m-0">Reports & Analytics</h5>
                   

                      <div class="d-flex gap-2">
            <button class="btn btn-outline-danger rounded-pill px-4 fw-bold pdf" onclick="downloadReport()">
              <i class="fas fa-file-pdf me-2"></i> Export PDF
            </button>

            <button class="btn btn-pinkie rounded-pill px-4 fw-bold" onclick="exportToCSV()">
              <i class="fas fa-file-csv me-2"></i> Export CSV
            </button>
          </div>
                </div>

                <div class="card glass-panel rounded-4 p-3 mb-4 border-0">
                    <div class="row g-3 align-items-end">
                     
                        <div class="col-md-4">
                            <label class="form-label text-muted fw-bold" style="font-size: 12px;">Start Date</label>
                            <input type="date" class="form-control glass-input-pink rounded-pill px-3 text-muted">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted fw-bold" style="font-size: 12px;">End Date</label>
                            <input type="date" class="form-control glass-input-pink rounded-pill px-3 text-muted">
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-outline-pinkie rounded-pill w-100 fw-bold py-2">
                                <i class="fas fa-sync-alt me-2"></i> Generate
                            </button>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-1 fw-bold" style="font-size: 13px;">Total Revenue</p>
                                    <h4 class="fw-bold text-pinkie m-0">Rs. 845,000</h4>
                                </div>
                                <div class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                                    style="width:50px; height:50px;">
                                    <i class="fas fa-coins fs-4 text-pinkie"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-1 fw-bold" style="font-size: 13px;">Total Orders</p>
                                    <h4 class="fw-bold text-dark m-0">142</h4>
                                </div>
                                <div class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                                    style="width:50px; height:50px;">
                                    <i class="fas fa-shopping-cart fs-4 text-dark"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-1 fw-bold" style="font-size: 13px;">Avg. Order Value</p>
                                    <h4 class="fw-bold text-success m-0">Rs. 5,950</h4>
                                </div>
                                <div class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                                    style="width:50px; height:50px;">
                                    <i class="fas fa-chart-line fs-4 text-success"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted mb-1 fw-bold" style="font-size: 13px;">Net Profit</p>
                                    <h4 class="fw-bold text-primary m-0">Rs. 320,500</h4>
                                </div>
                                <div class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                                    style="width:50px; height:50px;">
                                    <i class="fas fa-wallet fs-4 text-primary"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-lg-8">
                        <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                            <h6 class="fw-bold text-dark mb-4">Revenue Overview (Last 7 Days)</h6>
                            <div style="position: relative; height: 300px; width: 100%;">
                                <canvas id="salesChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                            <h6 class="fw-bold text-dark mb-4">Sales by Category</h6>
                            <div style="position: relative; height: 300px; width: 100%;">
                                <canvas id="categoryChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card glass-panel rounded-4 p-4 border-0 mb-5">
                    <h6 class="fw-bold text-dark mb-4">Top Performing Products</h6>
                    <div class="table-responsive">
                        <table class="table table-hover glass-table align-middle mb-0"
                            style="border-collapse: separate; border-spacing: 0 8px;">
                            <thead class="pink-header">
                                <tr>
                                    <th scope="col" class="ps-3">#ID</th>
                                    <th scope="col">PRODUCT</th>
                                    <th scope="col">CATEGORY</th>
                                    <th scope="col" class="text-center">UNITS SOLD</th>
                                    <th scope="col" class="text-end pe-3">REVENUE</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

            </div>

            <div id="footer-container"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/reports.js"></script>

</body>

</html>
