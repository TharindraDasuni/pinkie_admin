<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Categories</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 flex-grow-1">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold text-dark m-0">Manage Categories</h5>
                </div>

                <div class="row g-4 mb-5">
                    
                    <div class="col-lg-4">
                        <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                            <h6 class="fw-bold text-dark mb-4"><i class="fas fa-plus-circle text-pinkie me-2"></i>Add New Category</h6>
                            
                            <form id="addCategoryForm">
    <div class="mb-3">
        <label class="form-label text-muted fw-bold" style="font-size: 13px;">Category Name *</label>
        <input type="text" id="catName" class="form-control glass-input rounded-pill px-3 py-2" placeholder="e.g. Rings" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label text-muted fw-bold" style="font-size: 13px;">Description</label>
        <textarea id="catDesc" class="form-control glass-input rounded-4 px-3 py-2" rows="4" placeholder="Brief description about the category..."></textarea>
    </div>
    
    <div class="mb-4">
    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Category Image / Icon *</label>
    
    <div class="d-flex justify-content-center mt-2">
        <div id="imagePreviewBox" class="glass-upload-box d-flex flex-column align-items-center justify-content-center text-center shadow-sm" 
             onclick="document.getElementById('catImage').click()" 
             style="width: 150px; height: 150px; cursor: pointer; overflow: hidden; position: relative; border-radius: 20px; border: 2px dashed #da5586; background-color: #fcf4f7;">
            
            <div id="uploadPlaceholder">
                <i class="fas fa-cloud-upload-alt fs-3 text-pinkie mb-2"></i>
                <p class="text-muted m-0" style="font-size: 11px; font-weight: 500;">Click or Drop<br>1:1 Image</p>
            </div>
            
            <img id="imagePreview" src="" class="d-none" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1;">
            
            <button type="button" id="removeImageBtn" class="btn btn-sm btn-danger rounded-circle d-none shadow" 
                    onclick="removeImage(event)" 
                    style="position: absolute; top: 8px; right: 8px; z-index: 2; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-times" style="font-size: 14px;"></i>
            </button>
            
            <input type="file" class="d-none" id="catImage" accept="image/*" onchange="previewImage(event)">
        </div>
    </div>
</div>

    <button type="button" class="btn btn-pinkie rounded-pill w-100 fw-bold" onclick="saveCategory()">
        Save Category
    </button>
</form>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h6 class="fw-bold text-dark m-0"><i class="fas fa-list text-pinkie me-2"></i>Existing Categories</h6>
                                <div class="input-group w-50">
                                    <span class="input-group-text glass-input border-end-0 bg-transparent rounded-start-pill px-3">
                                        <i class="fas fa-search text-muted"></i>
                                    </span>
                                    <input type="text" class="form-control glass-input border-start-0 rounded-end-pill" placeholder="Search category...">
                                </div>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover glass-table align-middle mb-0" style="border-collapse: separate; border-spacing: 0 8px;">
                                    <thead class="pink-header">
                                        <tr>
                                            <th scope="col" class="ps-3">#ID</th>
                                            <th scope="col">ICON</th>
                                            <th scope="col">CATEGORY NAME</th>
                                            <th scope="col" class="text-center">PRODUCTS</th>
                                            <th scope="col" class="text-center">STATUS</th>
                                            <th scope="col" class="text-center pe-3">ACTIONS</th>
                                        </tr>
                                    </thead>
                                    <tbody id="categoryTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div id="footer-container"></div>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/categories.js"></script>

</body>

</html>
