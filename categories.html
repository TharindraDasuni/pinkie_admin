<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Categories</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 flex-grow-1">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold text-dark m-0">Manage Categories</h5>
                </div>

                <div class="row g-4 mb-5">
                    
                    <div class="col-lg-4">
                        <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                            <h6 class="fw-bold text-dark mb-4"><i class="fas fa-plus-circle text-pinkie me-2"></i>Add New Category</h6>
                            
                            <form id="addCategoryForm">
                                <div class="mb-3">
                                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Category Name *</label>
                                    <input type="text" class="form-control glass-input rounded-pill px-3 py-2" placeholder="e.g. Rings" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Description</label>
                                    <textarea class="form-control glass-input rounded-4 px-3 py-2" rows="4" placeholder="Brief description about the category..."></textarea>
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Category Image / Icon</label>
                                    <div class="glass-upload-box d-flex flex-column align-items-center justify-content-center text-center p-3 rounded-4" onclick="document.getElementById('catImage').click()" style="height: 120px;">
                                        <i class="fas fa-image fs-3 text-pinkie mb-2"></i>
                                        <p class="text-muted m-0" style="font-size: 12px;">Click to Upload Image</p>
                                        <input type="file" class="d-none" id="catImage" accept="image/*">
                                    </div>
                                </div>

                                <button type="button" class="btn btn-pinkie rounded-pill w-100 fw-bold" onclick="saveCategory()">
                                    Save Category
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h6 class="fw-bold text-dark m-0"><i class="fas fa-list text-pinkie me-2"></i>Existing Categories</h6>
                                <div class="input-group w-50">
                                    <span class="input-group-text glass-input border-end-0 bg-transparent rounded-start-pill px-3">
                                        <i class="fas fa-search text-muted"></i>
                                    </span>
                                    <input type="text" class="form-control glass-input border-start-0 rounded-end-pill" placeholder="Search category...">
                                </div>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover glass-table align-middle mb-0" style="border-collapse: separate; border-spacing: 0 8px;">
                                    <thead class="pink-header">
                                        <tr>
                                            <th scope="col" class="ps-3">#ID</th>
                                            <th scope="col">ICON</th>
                                            <th scope="col">CATEGORY NAME</th>
                                            <th scope="col" class="text-center">PRODUCTS</th>
                                            <th scope="col" class="text-center">STATUS</th>
                                            <th scope="col" class="text-center pe-3">ACTIONS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr class="bg-white bg-opacity-50 shadow-sm" style="border-radius: 10px;">
                                            <td class="fw-bold text-muted ps-3">C01</td>
                                            <td>
                                                <div class="product-img-box glass-input rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                                    <img src="https://cdn-icons-png.flaticon.com/512/879/879793.png" class="img-fluid" style="opacity: 0.8;">
                                                </div>
                                            </td>
                                            <td>
                                                <h6 class="mb-0 fw-bold text-dark" style="font-size: 14px;">Rings</h6>
                                                <small class="text-muted" style="font-size: 11px;">Bridal, Engagement, Casual</small>
                                            </td>
                                            <td class="text-center fw-bold text-dark fs-6">124</td>
                                            <td class="text-center"><span class="badge bg-success bg-opacity-75 rounded-pill px-3 py-2">Active</span></td>
                                            <td class="text-center pe-3">
                                                <button class="btn btn-sm btn-light text-primary rounded-circle shadow-sm me-1"><i class="fas fa-edit"></i></button>
                                                <button class="btn btn-sm btn-light text-danger rounded-circle shadow-sm"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>

                                        <tr class="bg-white bg-opacity-50 shadow-sm" style="border-radius: 10px;">
                                            <td class="fw-bold text-muted ps-3">C02</td>
                                            <td>
                                                <div class="product-img-box glass-input rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                                    <img src="https://cdn-icons-png.flaticon.com/512/1155/1155093.png" class="img-fluid" style="opacity: 0.8;">
                                                </div>
                                            </td>
                                            <td>
                                                <h6 class="mb-0 fw-bold text-dark" style="font-size: 14px;">Necklaces</h6>
                                                <small class="text-muted" style="font-size: 11px;">Pendants, Chains, Chokers</small>
                                            </td>
                                            <td class="text-center fw-bold text-dark fs-6">85</td>
                                            <td class="text-center"><span class="badge bg-success bg-opacity-75 rounded-pill px-3 py-2">Active</span></td>
                                            <td class="text-center pe-3">
                                                <button class="btn btn-sm btn-light text-primary rounded-circle shadow-sm me-1"><i class="fas fa-edit"></i></button>
                                                <button class="btn btn-sm btn-light text-danger rounded-circle shadow-sm"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>

                                        <tr class="bg-white bg-opacity-50 shadow-sm" style="border-radius: 10px;">
                                            <td class="fw-bold text-muted ps-3">C03</td>
                                            <td>
                                                <div class="product-img-box glass-input rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                                    <img src="https://cdn-icons-png.flaticon.com/512/834/834812.png" class="img-fluid" style="opacity: 0.8;">
                                                </div>
                                            </td>
                                            <td>
                                                <h6 class="mb-0 fw-bold text-dark" style="font-size: 14px;">Earrings</h6>
                                                <small class="text-muted" style="font-size: 11px;">Studs, Drops, Hoops</small>
                                            </td>
                                            <td class="text-center fw-bold text-dark fs-6">42</td>
                                            <td class="text-center"><span class="badge bg-danger bg-opacity-75 rounded-pill px-3 py-2">Inactive</span></td>
                                            <td class="text-center pe-3">
                                                <button class="btn btn-sm btn-light text-primary rounded-circle shadow-sm me-1"><i class="fas fa-edit"></i></button>
                                                <button class="btn btn-sm btn-light text-danger rounded-circle shadow-sm"><i class="fas fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div id="footer-container"></div>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/categories.js"></script>

</body>

</html>
