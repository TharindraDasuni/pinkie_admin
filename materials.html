<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinkie Admin | Materials</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="d-flex" id="wrapper">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <div id="sidebar-container"></div>

      <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
        <div id="navbar-container"></div>

        <div class="container-fluid px-4 flex-grow-1">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold text-dark m-0">Manage Materials</h5>
          </div>

          <div class="row g-4 mb-5">
            
            <div class="col-lg-4">
              <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                <h6 class="fw-bold text-dark mb-4">
                  <i class="fas fa-layer-group text-pinkie me-2"></i>Add New Material
                </h6>

                <form id="addMaterialForm">
                  <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Material Name *</label>
                    <input type="text" id="matName" class="form-control glass-input-pink  rounded-pill px-3 py-2" placeholder="e.g. 18K Yellow Gold" required />
                  </div>

                  <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Select Category *</label>
                    <select id="matCategory" class="form-select glass-input-pink  rounded-pill px-3 py-2" required>
                        <option value="" disabled selected>Choose a category...</option>
                        <option value="1">Rings</option>
                        <option value="2">Necklaces</option>
                        <option value="3">Earrings</option>
                    </select>
                  </div>

                  <div class="mb-4">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Select Product Type *</label>
                    <select id="matType" class="form-select glass-input-pink  rounded-pill px-3 py-2" required>
                        <option value="" disabled selected>Choose a type...</option>
                        <option value="1">Engagement Rings</option>
                        <option value="2">Wedding Bands</option>
                        <option value="3">Pendant Necklaces</option>
                    </select>
                  </div>

                  <button type="button" class="btn btn-pinkie rounded-pill w-100 fw-bold" onclick="saveMaterial()">Save Material</button>
                </form>
              </div>
            </div>

            <div class="col-lg-8">
              <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                <div class="d-flex justify-content-between align-items-center mb-4">
                  <h6 class="fw-bold text-dark m-0"><i class="fas fa-list text-pinkie me-2"></i>Existing Materials</h6>
                  <div class="input-group w-50">
                    <span class="input-group-text glass-input-pink  border-end-0 bg-transparent rounded-start-pill px-3">
                      <i class="fas fa-search text-muted"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control glass-input-pink  border-start-0 rounded-end-pill" placeholder="Search Materials..." />
                  </div>
                </div>

                <div class="table-responsive">
                  <table class="table table-hover glass-table align-middle mb-0" style="border-collapse: separate; border-spacing: 0 8px">
                    <thead class="pink-header">
                      <tr>
                        <th scope="col" class="ps-3">#ID</th>
                        <th scope="col">MATERIAL NAME</th>
                        <th scope="col">CATEGORY</th>
                        <th scope="col">TYPE</th>
                        <th scope="col" class="text-center">STATUS</th>
                        <th scope="col" class="text-center pe-3">ACTIONS</th>
                      </tr>
                    </thead>
                    <tbody id="materialTableBody">
                        <tr class="bg-white bg-opacity-50 shadow-sm" style="border-radius: 10px;">
                            <td class="ps-3 fw-bold text-muted">#M001</td>
                            <td class="fw-bold text-dark">18K Yellow Gold</td>
                            <td><span class="badge bg-light text-dark border">Rings</span></td>
                            <td><span class="badge bg-light text-dark border">Engagement Rings</span></td>
                            <td class="text-center"><span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">Active</span></td>
                            <td class="text-center pe-3">
                                <button class="btn btn-sm btn-outline-pinkie rounded-circle me-1" onclick="openEditMaterialModal('M001', '18K Yellow Gold', '1', '1', 'Active')"><i class="fas fa-edit"></i></button>
                            </td>
                        </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="footer-container"></div>
      </div>
    </div>

    <div class="modal fade" id="editMaterialModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg p-3">
                <div class="modal-header border-bottom-0">
                    <h5 class="fw-bold text-dark m-0"><i class="fas fa-edit text-pinkie me-2"></i>Edit Material</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editMaterialForm">
                        <input type="hidden" id="editMatId" />
                        
                        <div class="mb-3">
                            <label class="form-label text-muted fw-bold" style="font-size: 13px">Material Name *</label>
                            <input type="text" id="editMatName" class="form-control glass-input-pink  rounded-pill px-3 py-2" required />
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-bold" style="font-size: 13px">Category *</label>
                                <select id="editMatCategory" class="form-select glass-input-pink  rounded-pill px-3 py-2" required>
                                    <option value="1">Rings</option>
                                    <option value="2">Necklaces</option>
                                    <option value="3">Earrings</option>
                                </select>
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label class="form-label text-muted fw-bold" style="font-size: 13px">Product Type *</label>
                                <select id="editMatType" class="form-select glass-input-pink  rounded-pill px-3 py-2" required>
                                    <option value="1">Engagement Rings</option>
                                    <option value="2">Wedding Bands</option>
                                    <option value="3">Pendant Necklaces</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold" style="font-size: 13px">Status</label>
                            <select id="editMatStatus" class="form-select glass-input-pink  rounded-pill px-3 py-2">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>

                        <button type="button" class="btn btn-pinkie rounded-pill w-100 fw-bold py-2" onclick="updateMaterial()">Update Material</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/materials.js"></script>
  </body>
</html>
