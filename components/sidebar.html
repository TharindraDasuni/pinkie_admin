<script>
function logoutAdmin() {
    Swal.fire({
        title: 'Ready to Leave?',
        text: 'You are about to logout from the admin panel.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#da5586',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Yes, Logout',
        background: document.documentElement.getAttribute('data-theme') === 'dark' ? '#1a1a1c' : '#ffffff',
        color: document.documentElement.getAttribute('data-theme') === 'dark' ? '#f1f5f9' : '#1e293b'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = 'index.html';
        }
    });
}
</script>
