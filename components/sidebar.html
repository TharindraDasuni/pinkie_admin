    <!-- Theme Toggle - Clean No Border -->
    <div class="theme-toggle-wrapper">
        <span class="theme-toggle-label">
            <i class="fas fa-palette"></i>
            <span id="themeText">Light Mode</span>
        </span>
        <label class="theme-switch">
            <input type="checkbox" id="themeToggle">
            <span class="theme-slider"></span>
        </label>

    <!-- Navigation - No Selection Border -->

        <a href="dashboard.html" class="nav-item nav-dashboard">

        <a href="products.html" class="nav-item nav-products">

            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </a>
    </div>
</div>

<script>
    // Theme Toggle Functionality - Clean Version
    (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const themeToggle = document.getElementById('themeToggle');
        const themeText = document.getElementById('themeText');
        
        // Apply saved theme
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            if (themeToggle) themeToggle.checked = true;
            if (themeText) themeText.textContent = 'Dark Mode';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            if (themeToggle) themeToggle.checked = false;
            if (themeText) themeText.textContent = 'Light Mode';
        }
        
        // Theme toggle event
        if (themeToggle) {
            themeToggle.addEventListener('change', function() {
                if (this.checked) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                    if (themeText) themeText.textContent = 'Dark Mode';
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('theme', 'light');
                    if (themeText) themeText.textContent = 'Light Mode';
                }
            });
        }
    })();

    // Logout Function
    function logoutAdmin() {
        Swal.fire({
            title: 'Logout?',
            text: 'Are you sure you want to logout?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#da5586',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, Logout',
            background: document.documentElement.getAttribute('data-theme') === 'dark' ? '#1e293b' : '#ffffff',
            color: document.documentElement.getAttribute('data-theme') === 'dark' ? '#f1f5f9' : '#0f172a'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = 'index.html';
            }
        });
    }
</script>
