<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinkie Admin | Messages</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="d-flex" id="wrapper">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <div id="sidebar-container"></div>

      <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
        <div id="navbar-container"></div>

        <div class="container-fluid px-4 flex-grow-1">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold text-dark m-0">Customer Messages</h5>
          </div>

          <div class="row g-4 mb-4">
            
            <div class="col-lg-4">
              <div class="card glass-panel rounded-4 p-3 border-0 h-100">
                <div class="input-group mb-3">
                  <span class="input-group-text glass-input border-end-0 bg-transparent rounded-start-pill px-3">
                    <i class="fas fa-search text-muted"></i>
                  </span>
                  <input type="text" class="form-control glass-input border-start-0 rounded-end-pill" placeholder="Search chats..." />
                </div>

                <div class="chat-list-container pe-2" id="chatListContainer">
                  </div>
              </div>
            </div>

            <div class="col-lg-8">
              <div class="card glass-panel rounded-4 p-3 border-0 h-100 d-flex flex-column" id="chatAreaContainer">
                
                <div id="noChatSelected" class="d-flex flex-column justify-content-center align-items-center h-100 text-muted">
                    <i class="fas fa-comments fs-1 mb-3" style="color: #DA5586; opacity: 0.5;"></i>
                    <h5>Select a chat to start messaging</h5>
                </div>

                <div id="activeChatArea" class="d-none h-100 d-flex flex-column">
                    <div class="d-flex align-items-center border-bottom border-light pb-3 mb-3">
                        <img src="assets/images/placeholder.jpg" id="chatHeaderImg" class="rounded-circle object-fit-cover" style="width: 45px; height: 45px;" alt="User">
                        <div class="ms-3">
                            <h6 class="mb-0 fw-bold text-dark" id="chatHeaderName">User Name</h6>
                            <small class="text-success fw-bold" style="font-size: 11px;">● Online</small>
                        </div>
                        <div class="ms-auto">
                            <button class="btn btn-light rounded-circle text-muted shadow-sm"><i class="fas fa-ellipsis-v"></i></button>
                        </div>
                    </div>

                    <div class="chat-window-body flex-grow-1 d-flex flex-column gap-3 pe-2" id="chatBody">
                        </div>

                    <div class="mt-3">
                        <form id="sendMessageForm" class="chat-input-area d-flex align-items-center" onsubmit="sendMessage(event)">
                            <button type="button" class="btn text-muted fs-5"><i class="fas fa-camera"></i></button>
                            <button type="button" class="btn text-muted fs-5"><i class="fas fa-paperclip"></i></button>
                            
                            <input type="text" id="messageInput" class="form-control chat-input-field ms-2" placeholder="Type a message..." required autocomplete="off">
                            
                            <button type="submit" class="btn btn-pinkie rounded-circle ms-2 shadow-sm" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-paper-plane" style="margin-left: -2px;"></i>
                            </button>
                        </form>
                    </div>
                </div>

              </div>
            </div>

          </div>
        </div>

        <div id="footer-container"></div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/messages.js"></script>
  </body>
</html>
