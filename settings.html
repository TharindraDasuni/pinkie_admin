<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Settings</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 flex-grow-1">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold text-dark m-0">System Settings</h5>
                </div>

                <div class="row g-4 mb-5">

                    <div class="col-lg-8">

                        <div class="card glass-panel rounded-4 p-4 border-0 mb-4">
                            <h6 class="fw-bold text-dark mb-4"><i class="fas fa-store text-pinkie me-2"></i>Store
                                Information</h6>
                            <form>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-bold" style="font-size: 13px;">Store
                                            Name</label>
                                        <input type="text" class="form-control glass-input-pink rounded-pill px-3 py-2"
                                            value="Pinkie Jewelry Store">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-bold" style="font-size: 13px;">Support
                                            Email</label>
                                        <input type="email" class="form-control glass-input-pink rounded-pill px-3 py-2"
                                            value="support@pinkiejewelry.com">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-bold" style="font-size: 13px;">Phone
                                            Number</label>
                                        <input type="text" class="form-control glass-input-pink rounded-pill px-3 py-2"
                                            value="+94 11 234 5678">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-bold"
                                            style="font-size: 13px;">Currency</label>
                                        <select class="form-select glass-input-pink rounded-pill px-3 py-2">
                                            <option value="LKR" selected>LKR (Rs)</option>
                                            <option value="USD">USD ($)</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Store
                                        Address</label>
                                    <textarea class="form-control glass-input-pink rounded-4 px-3 py-2"
                                        rows="2">No 45, High Level Road, Nugegoda, Sri Lanka.</textarea>
                                </div>
                                <button type="button" class="btn btn-pinkie rounded-pill px-4 fw-bold"
                                    onclick="saveSettings('Store Information')">Save Changes</button>
                            </form>
                        </div>

                        <div class="card glass-panel rounded-4 p-4 border-0">
                            <h6 class="fw-bold text-dark mb-4"><i class="fas fa-bell text-pinkie me-2"></i>Notification
                                Preferences</h6>

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h6 class="mb-0 text-dark fw-bold" style="font-size: 14px;">New Order Alerts</h6>
                                    <small class="text-muted" style="font-size: 12px;">Get notified when a customer
                                        places a new order.</small>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input pinkie-switch" type="checkbox" checked
                                        style="cursor: pointer; width: 40px; height: 20px;">
                                </div>
                            </div>
                            <hr style="border-color: rgba(218,85,134,0.2);">

                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-0 text-dark fw-bold" style="font-size: 14px;">Low Stock Alerts</h6>
                                    <small class="text-muted" style="font-size: 12px;">Get notified when a product's
                                        stock is running low.</small>
                                </div>
                                <div class="form-check form-switch">
                                    <input class="form-check-input pinkie-switch" type="checkbox" checked
                                        style="cursor: pointer; width: 40px; height: 20px;">
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="col-lg-4">

                        <div class="card glass-panel rounded-4 p-4 border-0 mb-4 text-center">
                            <h6 class="fw-bold text-dark mb-3 text-start"><i
                                    class="fas fa-user-circle text-pinkie me-2"></i>Admin Profile</h6>

                            <div class="position-relative mx-auto mb-3" style="width: 110px; height: 110px;">
                                <div class="bg-white rounded-circle shadow-sm d-flex align-items-center justify-content-center h-100 w-100 overflow-hidden"
                                    style="border: 3px solid #da5586;">
                                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin"
                                        style="width: 100%; height: 100%; object-fit: cover;">
                                </div>
                                <button class="btn btn-pinkie rounded-circle position-absolute bottom-0 end-0 shadow"
                                    style="width: 32px; height: 32px; padding: 0;"
                                    onclick="document.getElementById('adminImageUpload').click()">
                                    <i class="fas fa-camera" style="font-size: 12px;"></i>
                                </button>
                            </div>
                            <input type="file" id="adminImageUpload" class="d-none" accept="image/*">

                            <div class="text-start mb-4">
                                <label class="form-label text-muted fw-bold" style="font-size: 13px;">Admin Email
                                    Address</label>
                                <input type="email" class="form-control glass-input-pink rounded-pill px-3 py-2"
                                    value="admin@pinkiejewelry.com">
                            </div>
                            <button type="button" class="btn btn-outline-pinkie w-100 rounded-pill fw-bold"
                                onclick="saveSettings('Admin Profile')">Update Profile</button>
                        </div>

                        <div class="card glass-panel rounded-4 p-4 border-0 mb-4 text-center">
                            <h6 class="fw-bold text-dark mb-3 text-start"><i
                                    class="fas fa-image text-pinkie me-2"></i>Store Logo</h6>
                            <div class="bg-white rounded-4 shadow-sm mx-auto mb-3 d-flex align-items-center justify-content-center"
                                style="width: 120px; height: 120px; overflow: hidden; border: 2px solid rgba(218,85,134,0.3);">
                                <img src="assets/images/logo_without_bc.png" alt="Store Logo"
                                    style="width: 80%; object-fit: contain;">
                            </div>
                            <button class="btn btn-outline-pinkie rounded-pill w-100 fw-bold btn-sm mb-2"
                                onclick="document.getElementById('logoUpload').click()">Change Logo</button>
                            <input type="file" id="logoUpload" class="d-none" accept="image/*">
                        </div>

                        <div class="card glass-panel rounded-4 p-4 border-0">
                            <h6 class="fw-bold text-dark mb-4"><i
                                    class="fas fa-shield-alt text-pinkie me-2"></i>Security Settings</h6>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Current
                                        Password</label>
                                    <input type="password" class="form-control glass-input-pink rounded-pill px-3 py-2"
                                        placeholder="Enter current password">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">New
                                        Password</label>
                                    <input type="password" class="form-control glass-input-pink rounded-pill px-3 py-2"
                                        placeholder="Enter new password">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted fw-bold" style="font-size: 13px;">Confirm New
                                        Password</label>
                                    <input type="password" class="form-control glass-input-pink rounded-pill px-3 py-2"
                                        placeholder="Confirm new password">
                                </div>
                                <button type="button" class="btn btn-dark w-100 rounded-pill fw-bold"
                                    onclick="saveSettings('Password')">Update Password</button>
                            </form>
                        </div>

                    </div>

                </div>

            </div>

            <div id="footer-container"></div>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/settings.js"></script>

</body>

</html>
