<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinkie Admin | Product Types</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css" />
    
    <link rel="stylesheet" href="assets/vendor/cropperjs/cropper.min.css" />
    
    <link rel="stylesheet" href="assets/css/style.css" />
    
    <style>
      /* Cropper Modal එකේ අමතර හැඩගැන්වීම් */
      .cropper-view-box,
      .cropper-face {
        border-radius: 10px; /* රවුම් හැඩයට Crop වෙන්න අවශ්‍ය නම් 50% දෙන්න */
      }
      .cropper-point {
        background-color: #da5586;
      }
      .cropper-line {
        background-color: #da5586;
      }
    </style>
  </head>

  <body>
    <div class="d-flex" id="wrapper">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <div id="sidebar-container"></div>

      <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
        <div id="navbar-container"></div>

        <div class="container-fluid px-4 flex-grow-1">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold text-dark m-0">Manage Product Types</h5>
          </div>

          <div class="row g-4 mb-5">
            <div class="col-lg-4">
              <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                <h6 class="fw-bold text-dark mb-4">
                  <i class="fas fa-tags text-pinkie me-2"></i>Add New Type
                </h6>

                <form id="addTypeForm">
                  <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Type Name *</label>
                    <input type="text" id="typeName" class="form-control glass-input rounded-pill px-3 py-2" placeholder="e.g. Engagement Rings" required />
                  </div>

                  <div class="mb-3">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Select Category *</label>
                    <select id="typeCategory" class="form-select glass-input rounded-pill px-3 py-2" required>
                        <option value="" disabled selected>Choose a category...</option>
                        <option value="1">Rings</option>
                        <option value="2">Necklaces</option>
                        <option value="3">Earrings</option>
                    </select>
                  </div>

                 
                  <div class="mb-4">
                    <label class="form-label text-muted fw-bold" style="font-size: 13px">Type Image (1:1 Ratio) *</label>
                    <div class="d-flex justify-content-center mt-2">
                      <div id="imagePreviewBox" class="glass-upload-box cat-upload-square d-flex flex-column align-items-center justify-content-center text-center shadow-sm" onclick="document.getElementById('typeImage').click()" style="width: 140px; height: 140px;">
                        <div id="uploadPlaceholder">
                          <i class="fas fa-image fs-3 text-pinkie mb-2"></i>
                          <p class="text-muted m-0" style="font-size: 11px; font-weight: 500">Click to Upload<br />& Crop Image</p>
                        </div>
                        <img id="imagePreview" src="" class="preview-cover d-none" />
                        <button type="button" id="removeImageBtn" class="btn btn-danger rounded-circle d-none shadow btn-remove-image" onclick="removeTypeImage(event)">
                          <i class="fas fa-times" style="font-size: 12px"></i>
                        </button>
                        <input type="file" class="d-none" id="typeImage" accept="image/*" onchange="triggerCropModal(event, 'imagePreview')" />
                      </div>
                    </div>
                  </div>

                  <button type="button" class="btn btn-pinkie rounded-pill w-100 fw-bold" onclick="saveType()">Save Type</button>
                </form>
              </div>
            </div>

            <div class="col-lg-8">
              <div class="card glass-panel rounded-4 p-4 border-0 h-100">
                <div class="d-flex justify-content-between align-items-center mb-4">
                  <h6 class="fw-bold text-dark m-0"><i class="fas fa-list text-pinkie me-2"></i>Existing Product Types</h6>
                  <div class="input-group w-50">
                    <span class="input-group-text glass-input border-end-0 bg-transparent rounded-start-pill px-3">
                      <i class="fas fa-search text-muted"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control glass-input border-start-0 rounded-end-pill" placeholder="Search..." />
                  </div>
                </div>

                <div class="table-responsive">
                  <table class="table table-hover glass-table align-middle mb-0" style="border-collapse: separate; border-spacing: 0 8px">
                    <thead class="pink-header">
                      <tr>
                        <th scope="col" class="ps-3">#ID</th>
                        <th scope="col">IMAGE</th>
                        <th scope="col">TYPE NAME</th>
                        <th scope="col">CATEGORY</th>
                        <th scope="col" class="text-center">STATUS</th>
                        <th scope="col" class="text-center pe-3">ACTIONS</th>
                      </tr>
                    </thead>
                    <tbody id="typeTableBody">
                        <tr>
                            <td class="ps-3 fw-bold text-muted">#T001</td>
                            <td><img src="assets/images/placeholder.jpg" class="rounded-3 shadow-sm" style="width: 45px; height: 45px; object-fit: cover;"></td>
                            <td class="fw-bold text-dark">Engagement Rings</td>
                            <td><span class="badge bg-light text-dark border">Rings</span></td>
                            <td class="text-center"><span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">Active</span></td>
                            <td class="text-center pe-3">
                                <button class="btn btn-sm btn-outline-pinkie rounded-circle me-1"><i class="fas fa-edit"></i></button>
                            </td>
                        </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="footer-container"></div>
      </div>
    </div>

    <div class="modal fade" id="cropModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg"> <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-bottom-0">
                    <h5 class="fw-bold text-dark m-0"><i class="fas fa-crop-alt text-pinkie me-2"></i>Crop Image (1:1)</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body p-0 bg-white" style="height: 450px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                    
                    <img id="imageToCrop" src="" style="max-width: 100%; max-height: 100%; display: block;" />
                    
                </div>
                
                <div class="modal-footer border-top-0 d-flex justify-content-between px-4 pb-4">
                    <button type="button" class="btn btn-light rounded-pill px-4 fw-bold" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-pinkie rounded-pill px-4 fw-bold" onclick="applyCrop()">Crop & Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    
    <script src="assets/vendor/cropperjs/cropper.min.js"></script>
    
    <script src="assets/js/script.js"></script>
    <script src="assets/js/types.js"></script>
  </body>
</html>
