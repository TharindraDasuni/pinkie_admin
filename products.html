<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Products</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 flex-grow-1">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold text-dark m-0">Manage Jewelry</h5>
                    <button class="btn btn-pinkie rounded-pill px-4 fw-bold">
                        <i class="fas fa-plus me-2"></i> Add New Product
                    </button>
                </div>

                <div class="card glass-panel rounded-4 p-3 mb-4 border-0">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text glass-input border-end-0 bg-transparent rounded-start-pill">
                                    <i class="fas fa-search text-muted"></i>
                                </span>
                                <input type="text" class="form-control glass-input border-start-0 rounded-end-pill" placeholder="Search products...">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select glass-input rounded-pill">
                                <option selected>All Categories</option>
                                <option value="1">Rings</option>
                                <option value="2">Necklaces</option>
                                <option value="3">Earrings</option>
                                <option value="4">Bracelets</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select glass-input rounded-pill">
                                <option selected>Status</option>
                                <option value="1">In Stock</option>
                                <option value="2">Out of Stock</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-pinkie rounded-pill w-100 fw-bold">
                                <i class="fas fa-filter me-1"></i> Filter
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card glass-panel rounded-4 p-4 border-0 mb-5">
                    <div class="table-responsive">
                        <table class="table table-hover glass-table align-middle mb-0">
                            <thead>
                                <tr class="text-muted">
                                    <th scope="col" class="border-bottom-0 pb-3">Product Info</th>
                                    <th scope="col" class="border-bottom-0 pb-3">Category</th>
                                    <th scope="col" class="border-bottom-0 pb-3">Price</th>
                                    <th scope="col" class="border-bottom-0 pb-3">Stock</th>
                                    <th scope="col" class="border-bottom-0 pb-3">Status</th>
                                    <th scope="col" class="border-bottom-0 pb-3 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="product-img-box glass-input rounded-3 p-2 me-3" style="width: 50px; height: 50px;">
                                                <img src="https://cdn-icons-png.flaticon.com/512/879/879793.png" class="img-fluid" style="opacity: 0.8;">
                                            </div>
                                            <div>
                                                <h6 class="mb-0 fw-bold text-dark">Premium Rose Gold Ring</h6>
                                                <small class="text-muted">SKU: RNG-001</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-muted fw-bold">Rings</td>
                                    <td class="text-dark fw-bold">Rs. 45,000</td>
                                    <td class="text-muted">24 Pcs</td>
                                    <td><span class="badge bg-success bg-opacity-75 rounded-pill px-3 py-2">In Stock</span></td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-light text-primary rounded-circle shadow-sm me-1"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light text-danger rounded-circle shadow-sm"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="product-img-box glass-input rounded-3 p-2 me-3" style="width: 50px; height: 50px;">
                                                <img src="https://cdn-icons-png.flaticon.com/512/1155/1155093.png" class="img-fluid" style="opacity: 0.8;">
                                            </div>
                                            <div>
                                                <h6 class="mb-0 fw-bold text-dark">Diamond Shine Necklace</h6>
                                                <small class="text-muted">SKU: NCK-042</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-muted fw-bold">Necklaces</td>
                                    <td class="text-dark fw-bold">Rs. 120,000</td>
                                    <td class="text-muted">5 Pcs</td>
                                    <td><span class="badge bg-warning bg-opacity-75 text-dark rounded-pill px-3 py-2">Low Stock</span></td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-light text-primary rounded-circle shadow-sm me-1"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light text-danger rounded-circle shadow-sm"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="product-img-box glass-input rounded-3 p-2 me-3" style="width: 50px; height: 50px;">
                                                <img src="https://cdn-icons-png.flaticon.com/512/834/834812.png" class="img-fluid" style="opacity: 0.8;">
                                            </div>
                                            <div>
                                                <h6 class="mb-0 fw-bold text-dark">Ruby Drop Earrings</h6>
                                                <small class="text-muted">SKU: ERG-018</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-muted fw-bold">Earrings</td>
                                    <td class="text-dark fw-bold">Rs. 35,500</td>
                                    <td class="text-muted">0 Pcs</td>
                                    <td><span class="badge bg-danger bg-opacity-75 rounded-pill px-3 py-2">Out of Stock</span></td>
                                    <td class="text-center">
                                        <button class="btn btn-sm btn-light text-primary rounded-circle shadow-sm me-1"><i class="fas fa-edit"></i></button>
                                        <button class="btn btn-sm btn-light text-danger rounded-circle shadow-sm"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <div id="footer-container"></div>
        </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>

</html>
