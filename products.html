<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkie Admin | Products</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/vendor/sweetalert2/sweetalert2.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <div id="sidebar-container"></div>

        <div id="page-content-wrapper" class="w-100 d-flex flex-column min-vh-100">
            <div id="navbar-container"></div>

            <div class="container-fluid px-4 flex-grow-1">

                <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
                    <h5 class="fw-bold text-dark m-0">Manage Products</h5>
                    <a href="add-product.html" class="btn btn-pinkie rounded-pill px-4 fw-bold text-decoration-none">
                        <i class="fas fa-plus me-2"></i> Add New Product
                    </a>
                </div>

                <div class="card glass-panel rounded-4 p-3 mb-4 border-0">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text glass-input border-end-0 bg-transparent"><i
                                        class="fas fa-search text-muted"></i></span>
                                <input type="text" class="form-control glass-input border-start-0 ps-0"
                                    placeholder="Search products...">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select glass-input text-muted">
                                <option selected>All Categories</option>
                                <option value="1">Rings</option>
                                <option value="2">Necklaces</option>
                                <option value="3">Earrings</option>
                                <option value="4">Bracelets</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select glass-input text-muted">
                                <option selected>Stock Status</option>
                                <option value="1">In Stock</option>
                                <option value="2">Low Stock</option>
                                <option value="3">Out of Stock</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-pinkie w-100 fw-bold rounded-pill">
                                <i class="fas fa-filter me-2"></i> Filter
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card glass-panel rounded-4 p-0 border-0 mb-5 overflow-hidden">
                    <div class="table-responsive">
                        <table class="table table-hover glass-table align-middle mb-0">
                            <thead class="pink-header">
                                <tr>
                                    <th scope="col" class="ps-4 py-3">#ID</th>
                                    <th scope="col" class="py-3">PRODUCT INFO</th>
                                    <th scope="col" class="py-3">CATEGORY</th>
                                    <th scope="col" class="py-3">PRICE</th>
                                    <th scope="col" class="py-3 text-center">STOCK</th>
                                    <th scope="col" class="py-3 text-center">STATUS</th>
                                    <th scope="col" class="text-end pe-4 py-3">ACTIONS</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="fw-bold text-muted ps-4">1001</td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="product-img-box glass-input rounded-3 p-1 me-3"
                                                style="width: 45px; height: 45px;">
                                                <img src="https://cdn-icons-png.flaticon.com/512/879/879793.png"
                                                    class="img-fluid" style="opacity: 0.9;">
                                            </div>
                                            <div>
                                                <h6 class="mb-0 fw-bold text-dark" style="font-size: 14px;">Premium Rose
                                                    Gold Ring</h6>
                                                <small class="text-muted">Bridal Collection</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-muted">Rings</td>
                                    <td class="fw-bold text-dark">Rs. 45,000</td>
                                    <td class="text-center"><span
                                            class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill">24
                                            in stock</span></td>
                                    <td class="text-center">
                                        <div class="dropdown">
                                            <button
                                                class="btn btn-sm btn-outline-success rounded-pill px-3 fw-bold dropdown-toggle"
                                                type="button" data-bs-toggle="dropdown" aria-expanded="false"
                                                style="font-size: 12px;">
                                                <i class="fas fa-eye me-1"></i> Published
                                            </button>
                                            <ul class="dropdown-menu shadow-sm rounded-3 border-0"
                                                style="font-size: 13px;">
                                                <li><a class="dropdown-item text-success fw-bold" href="#"
                                                        onclick="changeStatus(this, 'Published', 'Premium Rose Gold Ring')"><i
                                                            class="fas fa-eye me-2"></i> Published</a></li>
                                                <li><a class="dropdown-item text-secondary fw-bold" href="#"
                                                        onclick="changeStatus(this, 'Hidden', 'Premium Rose Gold Ring')"><i
                                                            class="fas fa-eye-slash me-2"></i> Hidden</a></li>
                                            </ul>
                                        </div>
                                    </td>
                                    <td class="text-end pe-4">
                                        <button class="btn btn-sm btn-light text-primary shadow-sm rounded-circle me-1"
                                            style="width: 32px; height: 32px;" title="Edit"><i
                                                class="fas fa-pen"></i></button>
                                        <button class="btn btn-sm btn-light text-danger shadow-sm rounded-circle"
                                            style="width: 32px; height: 32px;" title="Delete"><i
                                                class="fas fa-trash"></i></button>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="fw-bold text-muted ps-4">1002</td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="product-img-box glass-input rounded-3 p-1 me-3"
                                                style="width: 45px; height: 45px;">
                                                <img src="https://cdn-icons-png.flaticon.com/512/1155/1155093.png"
                                                    class="img-fluid" style="opacity: 0.9;">
                                            </div>
                                            <div>
                                                <h6 class="mb-0 fw-bold text-dark" style="font-size: 14px;">Diamond
                                                    Shine Necklace</h6>
                                                <small class="text-muted">Party Wear</small>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-muted">Necklaces</td>
                                    <td class="fw-bold text-dark">Rs. 120,000</td>
                                    <td class="text-center"><span
                                            class="badge bg-danger bg-opacity-10 text-danger px-3 py-2 rounded-pill">Out
                                            of Stock</span></td>
                                    <td class="text-center">
                                        <div class="dropdown">
                                            <button
                                                class="btn btn-sm btn-outline-secondary rounded-pill px-3 fw-bold dropdown-toggle"
                                                type="button" data-bs-toggle="dropdown" aria-expanded="false"
                                                style="font-size: 12px;">
                                                <i class="fas fa-eye-slash me-1"></i> Hidden
                                            </button>
                                            <ul class="dropdown-menu shadow-sm rounded-3 border-0"
                                                style="font-size: 13px;">
                                                <li><a class="dropdown-item text-success fw-bold" href="#"
                                                        onclick="changeStatus(this, 'Published', 'Diamond Shine Necklace')"><i
                                                            class="fas fa-eye me-2"></i> Published</a></li>
                                                <li><a class="dropdown-item text-secondary fw-bold" href="#"
                                                        onclick="changeStatus(this, 'Hidden', 'Diamond Shine Necklace')"><i
                                                            class="fas fa-eye-slash me-2"></i> Hidden</a></li>
                                            </ul>
                                        </div>
                                    </td>
                                    <td class="text-end pe-4">
                                        <button class="btn btn-sm btn-light text-primary shadow-sm rounded-circle me-1"
                                            style="width: 32px; height: 32px;" title="Edit" data-bs-toggle="modal"
                                            data-bs-target="#editProductModal">
                                            <i class="fas fa-pen"></i>
                                        </button> <button
                                            class="btn btn-sm btn-light text-danger shadow-sm rounded-circle"
                                            style="width: 32px; height: 32px;" title="Delete"><i
                                                class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
            <div id="footer-container"></div>
        </div>
    </div>
   
    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>

    <script>
        // Toggle Visibility Alert Function
        function toggleVisibility(checkbox, productName) {
            const isVisible = checkbox.checked;

            // Show SweetAlert Notification
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
            });

            if (isVisible) {
                Toast.fire({
                    icon: 'success',
                    title: `"${productName}" is now visible to customers.`
                });
            } else {
                Toast.fire({
                    icon: 'warning',
                    title: `"${productName}" has been hidden from the store.`
                });
            }
        }

        // Save Product Changes Alert
        function saveProductChanges() {
            // Close the modal first
            var myModalEl = document.getElementById('editProductModal');
            var modal = bootstrap.Modal.getInstance(myModalEl);
            modal.hide();

            // Show Success Alert
            Swal.fire({
                icon: 'success',
                title: 'Updated Successfully!',
                text: 'Product details have been saved.',
                confirmButtonColor: '#da5586',
                timer: 2000,
                showConfirmButton: false
            });
        }
    </script>
</body>

</html>
