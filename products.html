<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinkie Admin | Products</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png" />

    <link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css" />
    <link
      rel="stylesheet"
      href="assets/vendor/sweetalert2/sweetalert2.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="d-flex" id="wrapper">
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <div id="sidebar-container"></div>

      <div
        id="page-content-wrapper"
        class="w-100 d-flex flex-column min-vh-100"
      >
        <div id="navbar-container"></div>

        <div class="container-fluid px-4 flex-grow-1">
          <div
            class="d-flex justify-content-between align-items-center mb-4 mt-3"
          >
            <h5 class="fw-bold text-dark m-0">Manage Products</h5>
            <a
              href="add-product.html"
              class="btn btn-pinkie rounded-pill px-4 fw-bold text-decoration-none"
            >
              <i class="fas fa-plus me-2"></i> Add New Product
            </a>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-xl-3 col-md-6">
              <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <p class="text-muted mb-1 fs-6 fw-bold">Total Products</p>
                    <h3 class="fw-bold text-dark m-0">0</h3>
                  </div>
                  <div
                    class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px"
                  >
                    <i
                      class="fas fa-box-open"
                      style="color: #da5586; font-size: 18px"
                    ></i>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-xl-3 col-md-6">
              <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <p class="text-muted mb-1 fs-6 fw-bold">Published</p>
                    <h3 class="fw-bold text-success m-0">0</h3>
                  </div>
                  <div
                    class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px"
                  >
                    <i
                      class="fas fa-eye"
                      style="color: #198754; font-size: 18px"
                    ></i>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-xl-3 col-md-6">
              <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <p class="text-muted mb-1 fs-6 fw-bold">Low Stock</p>
                    <h3 class="fw-bold text-warning m-0">0</h3>
                  </div>
                  <div
                    class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px"
                  >
                    <i
                      class="fas fa-exclamation-triangle"
                      style="color: #ffc107; font-size: 18px"
                    ></i>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-xl-3 col-md-6">
              <div class="card dash-card glass-panel rounded-4 p-3 border-0">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <p class="text-muted mb-1 fs-6 fw-bold">Out of Stock</p>
                    <h3 class="fw-bold text-danger m-0">0</h3>
                  </div>
                  <div
                    class="glass-icon-box rounded-circle d-flex align-items-center justify-content-center"
                    style="width: 45px; height: 45px"
                  >
                    <i
                      class="fas fa-times-circle"
                      style="color: #dc3545; font-size: 18px"
                    ></i>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="card glass-panel rounded-4 p-3 mb-4 border-0">
            <div class="row g-3 align-items-center">
              <div class="col-md-4">
                <div class="input-group">
                  <span
                    class="input-group-text glass-input-pink border-end-0 bg-transparent"
                  >
                    <i class="fas fa-search text-muted"></i>
                  </span>
                  <input
                    type="text"
                    id="searchInput"
                    class="form-control glass-input-pink border-start-0 ps-0"
                    placeholder="Search by Name or ID..."
                    onkeyup="filterProducts()"
                  />
                </div>
              </div>
              <div class="col-md-3">
                <select
                  id="filterCategory"
                  class="form-select glass-input-pink text-muted"
                  onchange="filterProducts()"
                >
                  <option value="All" selected>All Categories</option>
                </select>
              </div>
              <div class="col-md-3">
                <select
                  id="filterStock"
                  class="form-select glass-input-pink text-muted"
                  onchange="filterProducts()"
                >
                  <option value="All" selected>All Stock Status</option>
                  <option value="InStock">In Stock (> 10)</option>
                  <option value="LowStock">Low Stock (1 - 10)</option>
                  <option value="OutOfStock">Out of Stock (0)</option>
                </select>
              </div>
            </div>
          </div>

          <div
            class="card glass-panel rounded-4 p-0 border-0 mb-5 overflow-hidden"
          >
            <div class="table-responsive">
              <table class="table table-hover glass-table align-middle mb-0">
                <thead class="pink-header">
                  <tr>
                    <th scope="col" class="ps-4 py-3">#ID</th>
                    <th scope="col" class="py-3">PRODUCT INFO</th>
                    <th scope="col" class="py-3">CATEGORY</th>
                    <th scope="col" class="py-3">Type</th>
                    <th scope="col" class="py-3">Material</th>
                    <th scope="col" class="py-3">PRICE</th>
                    <th scope="col" class="py-3 text-center">STOCK</th>
                    <th scope="col" class="py-3 text-center">STATUS</th>
                    <th scope="col" class="text-end pe-4 py-3">ACTIONS</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>
        <div id="footer-container"></div>
      </div>
    </div>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="assets/js/product.js"></script>
  </body>
</html>
